version: "3.9"

services:
  devopsdb:
    image: vinaydocks/repo:javaDB
    ports:
      - "3000:3306"
    deploy:
      replicas: 3
    networks:
      - mynetwork

  application:
    image: vinaydocks/repo:javaapp
    ports:
      - "2000:8080"
    deploy:
      replicas: 3
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
